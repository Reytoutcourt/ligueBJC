<script>
const table = document.getElementById("ranking");
let rows = Array.from(table.rows).slice(1);

rows.sort((a, b) => {
  return b.cells[1].innerText - a.cells[1].innerText;
});

rows.forEach(row => table.appendChild(row));
</script>
